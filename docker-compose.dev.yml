services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.turbo
      - /app/apps/frontend/.next
    working_dir: /app
    command: sh -c "apk add --no-cache libc6-compat && corepack enable && pnpm install && pnpm dev"
