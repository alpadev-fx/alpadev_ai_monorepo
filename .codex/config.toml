# Project-scoped Codex configuration for Alpadev AI Monorepo.
# Tuned for Turborepo + Next.js + tRPC + Prisma/MongoDB + Genkit.

model = "gpt-5.3-codex"
model_reasoning_effort = "medium"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "disabled"

# Keep long sessions stable with balanced token spend.
tool_output_token_limit = 1800
model_auto_compact_token_limit = 240000
project_doc_max_bytes = 65536

# Use a smaller model for reviews by default.
review_model = "gpt-5.1-codex-mini"

[sandbox_workspace_write]
network_access = false

[features]
shell_snapshot = true

[profiles.deep-reasoning]
model = "gpt-5.3-codex"
model_reasoning_effort = "high"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "disabled"
tool_output_token_limit = 2500
model_auto_compact_token_limit = 280000

[profiles.fast-iterate]
model = "gpt-5.1-codex-mini"
model_reasoning_effort = "medium"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "disabled"
tool_output_token_limit = 1200
model_auto_compact_token_limit = 180000

