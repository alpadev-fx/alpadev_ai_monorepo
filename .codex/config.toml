[mcp_servers.github]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-github"]

[mcp_servers.github.env]
GITHUB_PERSONAL_ACCESS_TOKEN = "${GITHUB_TOKEN}"

[mcp_servers.filesystem]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "."]

# No database-specific MCP is wired by default here because this repo uses
# Prisma on MongoDB plus selective Mongoose access, and the server choice
# should stay explicit instead of assuming a Postgres workflow.

[projects."/Users/alpadev/Desktop/alpadev_ai_monorepo/alpadev_ai_monorepo"]
trust_level = "trusted"
