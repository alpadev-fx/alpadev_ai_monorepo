map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

# Frontend - Next.js (Port 3000)
upstream alpadev_frontend {
  server 127.0.0.1:3000;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;
  server_name alpadev.xyz www.alpadev.xyz;

  location /.well-known/acme-challenge/ {
    root /var/www/letsencrypt;
  }

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name alpadev.xyz www.alpadev.xyz;

  ssl_certificate /etc/letsencrypt/live/alpadev.xyz/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/alpadev.xyz/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  client_max_body_size 25m;
  keepalive_timeout 65;

  # Frontend - All routes → alpadev-frontend (3000)
  location / {
    proxy_pass http://alpadev_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_cache_bypass $http_upgrade;
  }
}
